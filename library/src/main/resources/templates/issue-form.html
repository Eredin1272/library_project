<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h1>Issue Book</h1>

    <!-- Ошибка -->
    <div th:if="${error}" class="alert alert-danger">
        <p th:text="${error}" class="mb-0"></p>
    </div>

    <!-- Если нет книг -->
    <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning">
        Нет доступных книг
    </div>

    <form th:action="@{/loans/issue}" method="post" class="mt-3">

        <!-- Книга -->
        <div class="mb-3">
            <label class="form-label">Книга</label>
            <select name="bookId" class="form-select" required>
                <option value="">-- Выберите книгу --</option>
                <option th:each="book : ${books}"
                        th:value="${book.id}"
                        th:text="${book.title}">
                </option>
            </select>
        </div>

        <!-- Читатель -->
        <div class="mb-3">
            <label class="form-label">Читатель</label>
            <select name="readerId" class="form-select" required>
                <option value="">-- Выберите читателя --</option>
                <option th:each="reader : ${readers}"
                        th:value="${reader.id}"
                        th:text="${reader.name}">
                </option>
            </select>
        </div>

        <!-- Кнопки -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Issue</button>
            <a href="/loans" class="btn btn-secondary">Cancel</a>
        </div>

    </form>

</div>
</body>
</html>
