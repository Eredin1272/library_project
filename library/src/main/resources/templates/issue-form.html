<h1>Issue Book</h1>

<form th:action="@{/loans/issue}" method="post">

    <div th:if="${error}" style="color:red;">
        <p th:text="${error}"></p>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning" >
        Нет доступных книг
    </div>

    <label>Книга:</label>
    <select name="bookId" class="form-select" required>
        <option value="">-- Выберите книгу --</option>
        <option th:each="book : ${books}"
                th:value="${book.id}"
                th:text="${book.title}">
        </option>
    </select>

    <label>Читатель:</label>
    <select name="readerId">
        <option value="">-- Выберите читателя --</option>
        <option th:each="reader : ${readers}"
                th:value="${reader.id}"
                th:text="${reader.name}">
        </option>
    </select>

    <button type="submit">Issue</button>
</form>
