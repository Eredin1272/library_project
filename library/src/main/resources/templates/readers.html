<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Readers</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/navbar :: navbar"></div>


<div class="container mt-4">
    <h1>Readers</h1>

    <a href="/readers/new" class="btn btn-primary mb-3">+ Add Reader</a>

    <!-- Поиск -->
    <form action="/readers/search" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="keyword" class="form-control" placeholder="Search readers...">
        <button type="submit" class="btn btn-outline-primary">Search</button>
        <a href="/readers" class="btn btn-outline-secondary">Reset</a>
    </form>

    <!-- Если нет читателей -->
    <div th:if="${#lists.isEmpty(readers)}" class="alert alert-warning">
        В библиотеке нет зарегистрированных читателей
    </div>

    <!-- Таблица -->
    <table class="table table-striped table-bordered table-hover"
           th:if="${!#lists.isEmpty(readers)}">

        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Email</th>
            <th>Телефон</th>
            <th>Действия</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="reader, iterStat : ${readers}">
            <td th:text="${iterStat.count}"></td>

            <td th:text="${reader.name}"></td>
            <td th:text="${reader.email}"></td>
            <td th:text="${reader.phone}"></td>

            <td class="d-flex gap-2">
                <a th:href="@{/readers/delete/{id}(id=${reader.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Удалить читателя? История выдач тоже удалится');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>
