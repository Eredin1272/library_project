<form action="/readers/search" method="get">
    <input type="text" name="keyword" placeholder="Search readers...">
    <button type="submit">Search</button>
</form>

<div th:replace="fragments/navbar :: navbar"></div>

<h1>Readers</h1>

<a href="/readers/new">Add Reader</a>

<ul>
    <li th:each="reader : ${readers}">
        <span th:text="${reader.name}"></span>
        <a th:href="@{/readers/delete/{id}(id=${reader.id})}"
           class="btn btn-danger"
           onclick="return confirm('Вы уверены, что хотите удалить этого читателя? История выдач будет удалена.');">
            Delete
        </a>
    </li>
</ul>
