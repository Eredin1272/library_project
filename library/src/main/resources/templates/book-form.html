<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h1 th:text="${book.id != null} ? 'Edit Book' : 'Add Book'"></h1>

    <form th:action="${book.id} != null ? @{/books/update/{id}(id=${book.id})} : @{/books}"
          th:object="${book}"
          method="post"
          class="mt-4">

        <input type="hidden" th:field="*{id}" />

        <!-- Title -->
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" placeholder="Enter book's title"/>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}">
            </div>
        </div>

        <!-- Author -->
        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" th:field="*{author}" class="form-control" placeholder="Enter author's name"/>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('author')}"
                 th:errors="*{author}">
            </div>
        </div>

        <!-- ISBN -->
        <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" placeholder="Enter ISBN"/>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('isbn')}"
                 th:errors="*{isbn}">
            </div>
        </div>

        <!-- Кнопки -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/books" class="btn btn-secondary">Cancel</a>
        </div>

    </form>

</div>
</body>
</html>
