<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Form</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<h1>Book Form</h1>

<form th:action="@{/books}" th:object="${book}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Title:</label>
    <input type="text" th:field="*{title}" /><br>
    <div th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}"></div>

    <label>Author:</label>
    <input type="text" th:field="*{author}" /><br>
    <div th:if="${#fields.hasErrors('author')}"
         th:errors="*{author}"></div>

    <label>ISBN:</label>
    <input type="text" th:field="*{isbn}" /><br>
    <div th:if="${#fields.hasErrors('isbn')}"
         th:errors="*{isbn}"></div>

    <button type="submit">Save</button>

</form>

</body>
</html>
