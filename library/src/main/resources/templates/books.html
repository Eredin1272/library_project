<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head>
    <title>Books</title>
</head>
<body>

<form action="/books/search" method="get">
    <input type="text" name="keyword" placeholder="Search books...">
    <button type="submit">Search</button>
</form>

<div th:replace="fragments/navbar :: navbar"></div>
<h1>Books</h1>

<a href="/books/new">Add Book</a>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Available</th>
        <th>Actions</th>
    </tr>

    <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.available}"></td>

        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a>
            <a th:href="@{/books/delete/{id}(id=${book.id})}"
               class="btn btn-danger"
               onclick="return confirm('Вы уверены, что хотите удалить эту книгу? История выдач будет удалена.');">
                Delete
            </a>
        </td>
    </tr>

</table>

</body>
</html>
