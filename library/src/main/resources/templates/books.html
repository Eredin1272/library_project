<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-4">

    <h1>Books</h1>

    <a href="/books/new" class="btn btn-primary mb-3">+ Add Book</a>

    <!-- Поиск -->
    <form action="/books/search" method="get" class="mb-3 d-flex gap-2">
        <input type="text" name="keyword" class="form-control" placeholder="Search books...">
        <button type="submit" class="btn btn-outline-primary">Search</button>
        <a href="/books" class="btn btn-outline-secondary">Reset</a>
    </form>

    <!-- Если нет книг -->
    <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning">
        В библиотеке нет доступных книг
    </div>

    <!-- Таблица -->
    <table class="table table-striped table-bordered table-hover align-middle"
           th:if="${!#lists.isEmpty(books)}">

        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Название</th>
            <th>Автор</th>
            <th>ISBN</th>
            <th class="text-center">Статус</th>
            <th>Действия</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="book, iterStat : ${books}">
            <td th:text="${iterStat.count}"></td>

            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>

            <!-- Статус -->
            <td class="text-center">
                <span th:if="${book.available}" class="badge bg-success">Available</span>
                <span th:unless="${book.available}" class="badge bg-danger">Taken</span>
            </td>

            <!-- Действия -->
            <td class="d-flex gap-2">
                <a th:href="@{/books/edit/{id}(id=${book.id})}"
                   class="btn btn-sm btn-warning">Edit</a>

                <a th:if="${book.available}"
                   th:href="@{/books/delete/{id}(id=${book.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Удалить книгу?');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>
</body>
</html>
