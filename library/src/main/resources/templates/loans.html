<head>
    <title>Loans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/navbar :: navbar"></div>
<body>

<div class="container mt-4">

    <h1>Loans</h1>

    <a href="/loans/issue" class="btn btn-primary mb-3">+ Issue Book</a>

    <!-- Если пусто -->
    <div th:if="${#lists.isEmpty(loans)}" class="alert alert-warning">
        На данный момент журнал учёта книг пуст
    </div>

    <!-- Таблица -->
    <table class="table table-striped table-bordered table-hover align-middle"
           th:if="${!#lists.isEmpty(loans)}">

        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Книга</th>
            <th>Читатель</th>
            <th>Дата выдачи</th>
            <th>Дата возврата</th>
            <th class="text-center">Статус</th>
            <th>Действие</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="loan, iterStat : ${loans}">
            <td th:text="${iterStat.count}"></td>

            <td th:text="${loan.book.title}"></td>
            <td th:text="${loan.reader.name}"></td>
            <td th:text="${loan.issueDate}"></td>

            <td>
                    <span th:if="${loan.returnDate != null}"
                          th:text="${loan.returnDate}"></span>
                <span th:unless="${loan.returnDate != null}" class="text-muted">
                        —
                    </span>
            </td>

            <!-- Статус -->
            <td class="text-center">
                    <span th:if="${loan.returnDate == null}" class="badge bg-danger">
                        Active
                    </span>
                <span th:unless="${loan.returnDate == null}" class="badge bg-success">
                        Returned
                    </span>
            </td>

            <!-- Действие -->
            <td>
                <a th:if="${loan.returnDate == null}"
                   th:href="@{/loans/return/{id}(id=${loan.id})}"
                   class="btn btn-sm btn-success"
                   onclick="return confirm('Подтвердить возврат книги?');">
                    Return
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
